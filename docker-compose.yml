version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ipaas-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ipaas_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ipaas-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ipaas_dev
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - db

volumes:
  postgres_data:
